services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: career-copilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_copilot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: career-copilot-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: career-copilot-api
    restart: unless-stopped
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/career_copilot
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/career_copilot
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
    volumes:
      - media_data:/app/media
    command: >
      sh -c "alembic upgrade head && gunicorn -w 1 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000 --timeout 180 --graceful-timeout 30"

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: career-copilot-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/career_copilot
      REDIS_URL: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
    volumes:
      - media_data:/app/media
    command: celery -A app.tasks.celery_app worker -l info -Q default,exports

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: career-copilot-beat
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/career_copilot
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.tasks.celery_app beat -l info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: career-copilot-ui
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    container_name: career-copilot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/media

volumes:
  postgres_data:
  media_data:
